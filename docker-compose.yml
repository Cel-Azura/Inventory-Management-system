
services:
  # ─────────────────────────────────────────────
  #  DATABASE (PostgreSQL shared instance,
  #  each service gets its own schema/DB)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ims_admin
      POSTGRES_PASSWORD: ims_secret_2024
      POSTGRES_DB: ims_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_admin -d ims_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network

  # ─────────────────────────────────────────────
  #  AUTH SERVICE  (port 3001)
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: ims-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ims_admin
      DB_PASS: ims_secret_2024
      DB_NAME: ims_db
      JWT_SECRET: ims_jwt_super_secret_key_2024
      JWT_EXPIRES_IN: 8h
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  #  PRODUCT SERVICE  (port 3002)
  # ─────────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: ims-product
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ims_admin
      DB_PASS: ims_secret_2024
      DB_NAME: ims_db
      JWT_SECRET: ims_jwt_super_secret_key_2024
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  #  TRANSACTION SERVICE  (port 3003)
  # ─────────────────────────────────────────────
  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: ims-transaction
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ims_admin
      DB_PASS: ims_secret_2024
      DB_NAME: ims_db
      JWT_SECRET: ims_jwt_super_secret_key_2024
      PRODUCT_SERVICE_URL: http://product-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  #  REPORT SERVICE  (port 3004)
  # ─────────────────────────────────────────────
  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    container_name: ims-report
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ims_admin
      DB_PASS: ims_secret_2024
      DB_NAME: ims_db
      JWT_SECRET: ims_jwt_super_secret_key_2024
      PRODUCT_SERVICE_URL: http://product-service:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  #  API GATEWAY  (port 3000 → public entry point)
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: ims-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ims_jwt_super_secret_key_2024
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      REPORT_SERVICE_URL: http://report-service:3004
    ports:
      - "3000:3000"
    # FIX: Chờ services healthy trước khi khởi động gateway
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  #  FRONTEND  (Nginx static, port 80)
  # ─────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: ims-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    # FIX: Chờ api-gateway healthy
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ims-network

# ─────────────────────────────────────────────
#  SHARED RESOURCES
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

networks:
  ims-network:
    driver: bridge